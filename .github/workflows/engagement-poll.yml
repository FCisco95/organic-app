name: Engagement Poll

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger engagement poll
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/internal/engagement/poll"
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
