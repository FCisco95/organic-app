name: Security Scans

on:
  schedule:
    # Weekly Monday 09:00 UTC — catches advisories that land between PRs.
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security.yml
      - .github/dependabot.yml

permissions:
  contents: read

jobs:
  lockfile-and-deps:
    name: Lockfile + npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: lockfile-lint (https + npm registry only)
        run: npx --yes lockfile-lint --type npm --path package-lock.json --validate-https --allowed-hosts npm

      - name: audit-ci (high + critical, respects audit-ci.jsonc allowlist)
        # Uses the same config as the per-PR security-audit job in ci.yml.
        # Running it again on a schedule catches advisories newly published
        # against locked deps between PRs, and surfaces allowlist entries
        # whose expiry has passed (audit-ci re-fails when expiry lapses).
        run: npx audit-ci --config ./audit-ci.jsonc
