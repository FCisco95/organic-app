name: Security Scans

on:
  schedule:
    # Weekly Monday 09:00 UTC — catches advisories that land between PRs.
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security.yml
      - .github/dependabot.yml

permissions:
  contents: read

jobs:
  lockfile-and-deps:
    name: Lockfile + npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: lockfile-lint (https + npm registry only)
        run: npx --yes lockfile-lint --type npm --path package-lock.json --validate-https --allowed-hosts npm

      - name: npm audit (high + critical only)
        # audit-ci is the existing PR gate; this runs the raw npm audit on a
        # schedule so a freshly-published advisory pages someone via Actions
        # rather than waiting for the next PR.
        run: npm audit --audit-level=high
