name: Supabase Migration Sync

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/qa/sync-supabase-migrations.mjs'
      - '.github/workflows/supabase-migration-sync.yml'
  workflow_dispatch:

jobs:
  sync-main-db:
    name: Sync Main DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_MAIN_PROJECT_REF != '' && secrets.SUPABASE_MAIN_PROJECT_REF || 'dcqfuqjqmqrzycyvutkn' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing main project ref."
            exit 1
          fi

      - name: Apply and record local migrations on main DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_MAIN_PROJECT_REF != '' && secrets.SUPABASE_MAIN_PROJECT_REF || 'dcqfuqjqmqrzycyvutkn' }}
        run: |
          node scripts/qa/sync-supabase-migrations.mjs \
            --project-ref "$PROJECT_REF" \
            --apply \
            --allow-equivalent-errors \
            --record-applied \
            --reload-postgrest
