name: Supabase Migration Sync

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/qa/sync-supabase-migrations.mjs'
      - '.github/workflows/supabase-migration-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which Supabase projects to sync'
        required: true
        default: both
        type: choice
        options:
          - both
          - main
          - ci

jobs:
  sync-main-db:
    name: Sync Main DB Migrations
    if: github.event_name == 'push' || github.event.inputs.target == 'both' || github.event.inputs.target == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_MAIN_PROJECT_REF != '' && secrets.SUPABASE_MAIN_PROJECT_REF || 'dcqfuqjqmqrzycyvutkn' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing main project ref."
            exit 1
          fi

      - name: Apply and record local migrations on main DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_MAIN_PROJECT_REF != '' && secrets.SUPABASE_MAIN_PROJECT_REF || 'dcqfuqjqmqrzycyvutkn' }}
        run: |
          node scripts/qa/sync-supabase-migrations.mjs \
            --project-ref "$PROJECT_REF" \
            --apply \
            --allow-equivalent-errors \
            --record-applied \
            --reload-postgrest

  sync-ci-db:
    name: Sync CI DB Migrations
    if: github.event_name == 'push' || github.event.inputs.target == 'both' || github.event.inputs.target == 'ci'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_CI_PROJECT_REF != '' && secrets.SUPABASE_CI_PROJECT_REF || 'rrsftfoxcujsacipujrr' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing CI project ref."
            exit 1
          fi

      - name: Apply and record local migrations on CI DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_CI_PROJECT_REF != '' && secrets.SUPABASE_CI_PROJECT_REF || 'rrsftfoxcujsacipujrr' }}
        run: |
          node scripts/qa/sync-supabase-migrations.mjs \
            --project-ref "$PROJECT_REF" \
            --apply \
            --allow-equivalent-errors \
            --record-applied \
            --reload-postgrest
