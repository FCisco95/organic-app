name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate i18n keys across locales
        run: node scripts/validate-i18n-keys.mjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high 2>&1 | tee /tmp/audit.txt; if grep -q "found 0 vulnerabilities" /tmp/audit.txt; then exit 0; fi; echo "---"; echo "Checking for new high/critical vulns beyond known exceptions..."; if npm audit --audit-level=high 2>&1 | grep -E "Severity: (high|critical)" | grep -qvE "bigint-buffer|elliptic|lodash|next "; then echo "New high/critical vulnerability found — failing CI."; exit 1; else echo "Only known transitive dependency advisories present — passing."; exit 0; fi

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run security tests
        run: ./node_modules/.bin/vitest run tests/security/ --reporter=verbose

  supabase-ci-target-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: lint-and-build

    steps:
      - name: Validate Supabase CI target wiring
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_CI_PROJECT_REF: ${{ secrets.SUPABASE_CI_PROJECT_REF }}
          SUPABASE_MAIN_PROJECT_REF: ${{ secrets.SUPABASE_MAIN_PROJECT_REF }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Missing NEXT_PUBLIC_SUPABASE_URL (or CI_NEXT_PUBLIC_SUPABASE_URL)."
            exit 1
          fi

          ACTUAL_REF="$(echo "$NEXT_PUBLIC_SUPABASE_URL" | sed -E 's#https://([^.]+)\.supabase\.co/?#\1#')"
          if [ -z "$ACTUAL_REF" ] || [ "$ACTUAL_REF" = "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Could not parse Supabase project ref from NEXT_PUBLIC_SUPABASE_URL."
            exit 1
          fi

          if [ -n "$SUPABASE_CI_PROJECT_REF" ] && [ "$ACTUAL_REF" != "$SUPABASE_CI_PROJECT_REF" ]; then
            echo "CI is targeting Supabase ref '$ACTUAL_REF' but expected '$SUPABASE_CI_PROJECT_REF'."
            exit 1
          fi

          if [ -n "$SUPABASE_MAIN_PROJECT_REF" ] && [ -n "$SUPABASE_CI_PROJECT_REF" ] && [ "$SUPABASE_MAIN_PROJECT_REF" = "$SUPABASE_CI_PROJECT_REF" ]; then
            echo "SUPABASE_MAIN_PROJECT_REF and SUPABASE_CI_PROJECT_REF must be different."
            exit 1
          fi

          echo "Supabase CI target verified: $ACTUAL_REF"

  e2e-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-build, unit-tests, supabase-ci-target-check]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run integrity E2E gate
        run: |
          npx playwright test \
            tests/proposals-lifecycle.spec.ts \
            tests/voting-integrity.spec.ts \
            tests/proposal-task-flow.spec.ts \
            tests/sprint-phase-engine.spec.ts \
            tests/dispute-sla.spec.ts \
            tests/rewards-settlement-integrity.spec.ts \
            tests/admin-config-audit.spec.ts \
            tests/ui-smoke.spec.ts \
            --workers=1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' && secrets.CI_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk

      - name: Upload Playwright report (integrity gate)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-integrity
          path: playwright-report
          if-no-files-found: ignore

  e2e-operational-controls:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-build, unit-tests, supabase-ci-target-check]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Mark operational-controls run start
        run: echo "OP_CONTROLS_SINCE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run operational-controls E2E gate
        run: |
          mkdir -p test-results
          set -o pipefail
          CI=true npx playwright test \
            tests/voting-integrity.spec.ts \
            tests/rewards-settlement-integrity.spec.ts \
            --workers=1 --reporter=list | tee test-results/operational-controls-playwright.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' && secrets.CI_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk

      - name: Export operational-controls audit snapshot
        if: always()
        run: node scripts/qa/export-operational-controls-audit.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' && secrets.CI_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OP_CONTROLS_SINCE: ${{ env.OP_CONTROLS_SINCE }}
          OP_CONTROLS_AUDIT_OUT: test-results/operational-controls-audit.json

      - name: Upload Playwright report (operational controls)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-operational-controls
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload operational-controls evidence artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: operational-controls-evidence
          path: test-results/operational-controls-*.*
          if-no-files-found: ignore

  e2e-full-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [e2e-integrity, e2e-operational-controls]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite (non-blocking evidence)
        continue-on-error: true
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_URL != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.CI_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' && secrets.CI_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk

      - name: Upload Playwright report (full suite)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-full
          path: playwright-report
          if-no-files-found: ignore
