name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate i18n keys across locales
        run: node scripts/validate-i18n-keys.mjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run audit-ci
        run: npx audit-ci --config ./audit-ci.jsonc

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run security tests
        run: ./node_modules/.bin/vitest run tests/security/ --reporter=verbose

  e2e-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint-and-build, unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase
        id: supabase
        uses: ./.github/actions/setup-supabase

      - name: Run integrity E2E gate
        # NOTE: tests/proposals-lifecycle, tests/proposal-task-flow,
        # tests/sprint-phase-engine, tests/dispute-sla are still excluded —
        # they depend on test-data state the hosted CI project accumulated
        # and the fresh ephemeral Supabase does not reproduce. Tracked in #58.
        # tests/voting-integrity.spec.ts re-enabled — issue #59 had two root
        # causes, both now fixed: (a) consensus path bypassing fixture
        # dispatcher (src/lib/solana/rpc-live.ts); (b) self-referential RLS
        # policy on proposal_voter_snapshots collapsing to false under
        # session auth (supabase/migrations/20260511140000_fix_voter_snapshots_rls_recursion.sql).
        run: |
          npx playwright test \
            tests/rewards-settlement-integrity.spec.ts \
            tests/admin-config-audit.spec.ts \
            tests/ui-smoke.spec.ts \
            tests/voting-integrity.spec.ts \
            --workers=1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk
          SOLANA_RPC_MODE: fixture

      - name: Upload Playwright report (integrity gate)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-integrity
          path: playwright-report
          if-no-files-found: ignore

  e2e-operational-controls:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint-and-build, unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase
        id: supabase
        uses: ./.github/actions/setup-supabase

      - name: Mark operational-controls run start
        run: echo "OP_CONTROLS_SINCE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run operational-controls E2E gate
        # tests/voting-integrity.spec.ts re-enabled — issue #59 fully fixed
        # (consensus bypass + RLS recursion). See e2e-integrity comment above.
        run: |
          mkdir -p test-results
          set -o pipefail
          CI=true npx playwright test \
            tests/rewards-settlement-integrity.spec.ts \
            tests/voting-integrity.spec.ts \
            --workers=1 --reporter=list | tee test-results/operational-controls-playwright.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk
          SOLANA_RPC_MODE: fixture

      - name: Export operational-controls audit snapshot
        if: always()
        run: node scripts/qa/export-operational-controls-audit.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          OP_CONTROLS_SINCE: ${{ env.OP_CONTROLS_SINCE }}
          OP_CONTROLS_AUDIT_OUT: test-results/operational-controls-audit.json

      - name: Upload Playwright report (operational controls)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-operational-controls
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload operational-controls evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operational-controls-evidence
          path: test-results/operational-controls-*.*
          if-no-files-found: ignore

  e2e-full-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [e2e-integrity, e2e-operational-controls]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase
        id: supabase
        uses: ./.github/actions/setup-supabase

      - name: Run full E2E suite (non-blocking evidence)
        continue-on-error: true
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
          NEXT_PUBLIC_ORG_TOKEN_MINT: DuXugm4oTXrGDopgxgudyhboaf6uUg1GVbJ6jk6qbonk
          SOLANA_RPC_MODE: fixture

      - name: Upload Playwright report (full suite)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-full
          path: playwright-report
          if-no-files-found: ignore
