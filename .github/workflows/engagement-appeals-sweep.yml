name: Engagement Appeals Sweep

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger appeals sweep
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/internal/engagement/appeals-sweep"
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
